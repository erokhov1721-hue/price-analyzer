<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Price Analyzer — MR Group</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="app-layout">

  <!-- ════════════════ SIDEBAR ════════════════ -->
  <aside class="sidebar">

    <div class="sidebar-logo">
      <div class="logo-icon"><i class="bi bi-graph-up-arrow"></i></div>
      <div class="logo-text">
        <h1>Price Analyzer</h1>
        <p>MR Group</p>
      </div>
    </div>

    <!-- Новый проект -->
    <div class="new-project-form">
      <input type="text" id="newProjectName" placeholder="Название проекта" maxlength="80">
      <input type="text" id="newProjectDesc" placeholder="Описание (опционально)" maxlength="200">
      <button id="btnCreateProject"><i class="bi bi-plus-lg"></i> Создать проект</button>
    </div>

    <!-- Список проектов -->
    <div class="projects-list">
      <div class="projects-list-title">Проекты</div>
      <div id="projectsList">
        <div class="sidebar-empty">Проектов пока нет</div>
      </div>
    </div>

  </aside>

  <!-- ════════════════ MAIN ════════════════ -->
  <main class="main-content">

    <!-- Заглушка — нет выбранного проекта -->
    <div class="empty-state" id="emptyState">
      <div class="empty-icon"><i class="bi bi-folder2-open"></i></div>
      <h2>Выберите проект</h2>
      <p>Выберите проект из списка слева или создайте новый</p>
    </div>

    <!-- Вид проекта -->
    <div class="project-view" id="projectView" style="display:none">

      <!-- Шапка проекта -->
      <div class="project-header">
        <div class="project-header-left">
          <div class="project-title" id="viewProjectName">—</div>
          <div class="project-desc"  id="viewProjectDesc"></div>
        </div>
        <button class="btn-delete-project" id="btnDeleteProject" title="Удалить проект">
          <i class="bi bi-trash3"></i>
        </button>
      </div>

      <!-- Загрузка файла -->
      <div class="card upload-card">
        <div class="card-section">
          <div class="section-label">Новый анализ</div>
          <div class="drop-zone" id="dropZone">
            <input type="file" id="fileInput" accept=".xlsx">
            <div class="drop-icon"><i class="bi bi-cloud-upload"></i></div>
            <h3>Перетащите .xlsx файл сюда</h3>
            <p>или <a id="chooseLink">выберите файл</a> на компьютере</p>
          </div>
          <div class="file-pill" id="filePill">
            <i class="bi bi-file-earmark-spreadsheet"></i>
            <span class="fname" id="fName"></span>
            <span class="remove" id="removeFile"><i class="bi bi-x"></i></span>
          </div>
        </div>
        <div class="card-section">
          <button class="btn-primary" id="btnAnalyze" disabled>
            <i class="bi bi-play-fill"></i>&nbsp; Запустить анализ
          </button>
        </div>

        <!-- Прогресс -->
        <div class="progress-section" id="progressSection">
          <div class="progress-header">
            <span id="progressLabel">Читаем файл…</span>
            <span class="progress-pct" id="progressPct">0%</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </div>

        <div class="error-box" id="errorBox"></div>
      </div>

      <!-- История -->
      <div class="history-header">
        <span>История запусков</span>
        <span class="history-count" id="historyCount"></span>
      </div>

      <div id="analysesList">
        <div class="history-empty">Запусков пока нет — загрузите первый файл</div>
      </div>

    </div>
  </main>
</div>

<!-- ═══════════ Шаблон карточки анализа ═══════════ -->
<template id="tplAnalysis">
  <div class="analysis-card">
    <div class="analysis-header">
      <div class="analysis-meta">
        <span class="analysis-filename"></span>
        <span class="analysis-date"></span>
      </div>
      <div class="analysis-status"></div>
    </div>
    <div class="analysis-stats">
      <div class="astat-box">
        <div class="astat-num total"></div>
        <div class="astat-lbl">обработано</div>
      </div>
      <div class="astat-box">
        <div class="astat-num auto"></div>
        <div class="astat-lbl">авто</div>
      </div>
      <div class="astat-box">
        <div class="astat-num req"></div>
        <div class="astat-lbl">на запрос</div>
      </div>
    </div>
    <div class="analysis-files"></div>
  </div>
</template>

<script>
// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let currentProjectId = null;
let selectedFile     = null;

// ═══════════════════════════════════════════════════════
//  API helpers
// ═══════════════════════════════════════════════════════
const api = {
  async get(url)           { const r = await fetch(url);                   return r.json(); },
  async post(url, body)    { const r = await fetch(url, { method:'POST',  headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) }); return r.json(); },
  async patch(url, body)   { const r = await fetch(url, { method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) }); return r.json(); },
  async del(url)           { const r = await fetch(url, { method:'DELETE' }); return r.json(); },
  async postForm(url, fd)  { const r = await fetch(url, { method:'POST', body: fd }); return r.json(); },
};

// ═══════════════════════════════════════════════════════
//  PROJECTS
// ═══════════════════════════════════════════════════════
async function loadProjects() {
  try {
    const projects = await api.get('/api/projects');
    if (projects.error) throw new Error(projects.error);
    renderProjects(projects);
  } catch (err) {
    document.getElementById('projectsList').innerHTML =
      `<div class="sidebar-empty" style="color:#e74c3c">Ошибка загрузки</div>`;
    console.error('loadProjects:', err.message);
  }
}

function renderProjects(projects) {
  const list = document.getElementById('projectsList');
  if (!projects.length) {
    list.innerHTML = '<div class="sidebar-empty">Проектов пока нет</div>';
    return;
  }
  list.innerHTML = projects.map(p => `
    <div class="project-card ${p.id === currentProjectId ? 'active' : ''}"
         data-id="${p.id}" data-name="${esc(p.name)}" data-desc="${esc(p.description||'')}">
      <div class="project-card-header">
        <span class="project-name">${esc(p.name)}</span>
        <button class="btn-edit-project" data-id="${p.id}" title="Редактировать">
          <i class="bi bi-pencil"></i>
        </button>
      </div>
      ${p.description ? `<div class="project-stats">${esc(p.description)}</div>` : ''}
      <div class="project-dates">${fmtDate(p.created_at)}</div>
    </div>
  `).join('');

  list.querySelectorAll('.project-card').forEach(card => {
    card.onclick = e => {
      if (e.target.closest('.btn-edit-project')) return;
      openProject(card.dataset.id, card.dataset.name, card.dataset.desc);
    };
  });

  list.querySelectorAll('.btn-edit-project').forEach(btn => {
    btn.onclick = e => {
      e.stopPropagation();
      const card = btn.closest('.project-card');
      startEditProject(card.dataset.id, card.dataset.name, card.dataset.desc || '');
    };
  });
}

function startEditProject(id, currentName, currentDesc) {
  const card = document.querySelector(`.project-card[data-id="${id}"]`);
  if (!card) return;

  const nameEl  = card.querySelector('.project-name');
  const descEl  = card.querySelector('.project-stats');
  const datesEl = card.querySelector('.project-dates');
  const editBtn = card.querySelector('.btn-edit-project');

  // Name input
  const nameInput = document.createElement('input');
  nameInput.type = 'text';
  nameInput.className = 'project-edit-input';
  nameInput.value = currentName;
  nameInput.maxLength = 80;

  // Description input
  const descInput = document.createElement('input');
  descInput.type = 'text';
  descInput.className = 'project-edit-input';
  descInput.value = currentDesc;
  descInput.maxLength = 200;
  descInput.placeholder = 'Описание (опционально)';
  descInput.style.marginTop = '6px';
  descInput.style.fontSize = '12px';
  descInput.style.fontWeight = '400';
  descInput.style.opacity = '0.8';

  // Swap elements
  nameEl.replaceWith(nameInput);
  if (descEl) {
    descEl.replaceWith(descInput);
  } else {
    datesEl.before(descInput);
  }
  editBtn.style.display = 'none';

  card.style.pointerEvents = 'none';
  nameInput.style.pointerEvents = 'auto';
  descInput.style.pointerEvents = 'auto';

  nameInput.focus();
  nameInput.select();

  let saving = false;

  async function save() {
    if (saving) return;
    const newName = nameInput.value.trim();
    const newDesc = descInput.value.trim();
    if (!newName) { cancel(); return; }
    if (newName === currentName && newDesc === currentDesc) { cancel(); return; }
    saving = true;
    try {
      const updated = await api.patch(`/api/projects/${id}`, { name: newName, description: newDesc || null });
      card.dataset.name = updated.name;
      card.dataset.desc = updated.description || '';
      await loadProjects();
      if (currentProjectId === id) {
        document.getElementById('viewProjectName').textContent = updated.name;
        document.getElementById('viewProjectDesc').textContent = updated.description || '';
      }
    } catch (err) {
      cancel();
    }
  }

  function cancel() {
    // Restore name
    const span = document.createElement('span');
    span.className = 'project-name';
    span.textContent = currentName;
    nameInput.replaceWith(span);
    // Restore desc
    if (currentDesc) {
      const d = document.createElement('div');
      d.className = 'project-stats';
      d.textContent = currentDesc;
      descInput.replaceWith(d);
    } else {
      descInput.remove();
    }
    editBtn.style.display = '';
    card.style.pointerEvents = '';
  }

  // Save on blur of either field — delay so focus can move between the two inputs
  nameInput.onblur = () => setTimeout(() => { if (!card.contains(document.activeElement)) save(); }, 150);
  descInput.onblur = () => setTimeout(() => { if (!card.contains(document.activeElement)) save(); }, 150);

  nameInput.onkeydown = e => {
    if (e.key === 'Enter')  { e.preventDefault(); descInput.focus(); descInput.select(); }
    if (e.key === 'Escape') { e.preventDefault(); nameInput.onblur = null; descInput.onblur = null; cancel(); }
  };
  descInput.onkeydown = e => {
    if (e.key === 'Enter')  { e.preventDefault(); descInput.blur(); }
    if (e.key === 'Escape') { e.preventDefault(); nameInput.onblur = null; descInput.onblur = null; cancel(); }
  };
}

async function openProject(id, name, desc) {
  currentProjectId = id;
  document.getElementById('emptyState').style.display   = 'none';
  document.getElementById('projectView').style.display  = 'block';
  document.getElementById('viewProjectName').textContent = name;
  document.getElementById('viewProjectDesc').textContent = desc || '';

  // Активный стиль в сайдбаре
  document.querySelectorAll('.project-card').forEach(c =>
    c.classList.toggle('active', c.dataset.id === id)
  );

  resetUpload();
  await loadAnalyses(id);
}

document.getElementById('btnCreateProject').onclick = async () => {
  const nameInput = document.getElementById('newProjectName');
  const name = nameInput.value.trim();
  if (!name) { nameInput.focus(); return; }

  const btn = document.getElementById('btnCreateProject');
  btn.disabled = true;
  btn.innerHTML = '<i class="bi bi-arrow-repeat"></i> Создаём…';

  try {
    const p = await api.post('/api/projects', {
      name,
      description: document.getElementById('newProjectDesc').value.trim(),
    });
    if (p.error) throw new Error(p.error);
    document.getElementById('newProjectName').value = '';
    document.getElementById('newProjectDesc').value = '';
    await loadProjects();
    openProject(p.id, p.name, p.description || '');
  } catch (err) {
    showToast('Ошибка: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-plus-lg"></i> Создать проект';
  }
};

document.getElementById('btnDeleteProject').onclick = async () => {
  if (!currentProjectId) return;
  const name = document.getElementById('viewProjectName').textContent;
  if (!confirm(`Удалить проект «${name}» и все его данные?`)) return;
  await api.del(`/api/projects/${currentProjectId}`);
  currentProjectId = null;
  document.getElementById('emptyState').style.display  = 'block';
  document.getElementById('projectView').style.display = 'none';
  await loadProjects();
};

// ═══════════════════════════════════════════════════════
//  UPLOAD
// ═══════════════════════════════════════════════════════
const dropZone   = document.getElementById('dropZone');
const fileInput  = document.getElementById('fileInput');
const filePill   = document.getElementById('filePill');
const fName      = document.getElementById('fName');
const btnAnalyze = document.getElementById('btnAnalyze');

document.getElementById('chooseLink').onclick = e => { e.stopPropagation(); fileInput.click(); };
dropZone.onclick = () => fileInput.click();

dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f && f.name.endsWith('.xlsx')) setFile(f);
});
fileInput.onchange = () => { if (fileInput.files[0]) setFile(fileInput.files[0]); };

document.getElementById('removeFile').onclick = e => {
  e.stopPropagation(); resetUpload();
};

function setFile(f) {
  selectedFile = f;
  fName.textContent = f.name;
  filePill.style.display = 'flex';
  btnAnalyze.disabled = false;
  document.getElementById('errorBox').style.display = 'none';
}

function resetUpload() {
  selectedFile = null;
  fileInput.value = '';
  filePill.style.display = 'none';
  btnAnalyze.disabled = true;
  document.getElementById('progressSection').style.display = 'none';
  document.getElementById('errorBox').style.display = 'none';
}

// ── Progress ──────────────────────────────────────────
let pTimer = null;
const STAGES = [
  [0,  12, 700,  'Читаем файл…'],
  [12, 35, 1100, 'Определяем столбцы…'],
  [35, 72, 2400, 'Анализируем строки…'],
  [72, 88, 1400, 'Загружаем в Supabase…'],
];
function startProgress() {
  const fill = document.getElementById('progressFill');
  const lbl  = document.getElementById('progressLabel');
  const pct  = document.getElementById('progressPct');
  fill.style.width = '0%'; pct.textContent = '0%'; let i = 0;
  const run = () => {
    if (i >= STAGES.length) return;
    const [, to, dur, text] = STAGES[i++];
    lbl.textContent = text;
    fill.style.transition = `width ${dur}ms ease`;
    fill.style.width = to + '%'; pct.textContent = to + '%';
    pTimer = setTimeout(run, dur + 80);
  };
  run();
}
function stopProgress() {
  clearTimeout(pTimer);
  const fill = document.getElementById('progressFill');
  fill.style.transition = 'width .3s ease';
  fill.style.width = '100%';
  document.getElementById('progressPct').textContent = '100%';
}

// ── Run analysis ──────────────────────────────────────
btnAnalyze.onclick = async () => {
  if (!selectedFile || !currentProjectId) return;
  btnAnalyze.disabled = true;
  document.getElementById('errorBox').style.display = 'none';
  document.getElementById('progressSection').style.display = 'block';
  startProgress();

  const fd = new FormData();
  fd.append('file', selectedFile);

  try {
    const data = await api.postForm(`/api/projects/${currentProjectId}/analyze`, fd);
    stopProgress();
    await new Promise(r => setTimeout(r, 350));
    document.getElementById('progressSection').style.display = 'none';

    if (data.error) throw new Error(data.error);

    resetUpload();
    await loadAnalyses(currentProjectId);
  } catch (err) {
    stopProgress();
    document.getElementById('progressSection').style.display = 'none';
    const box = document.getElementById('errorBox');
    box.textContent = '⚠️ ' + err.message;
    box.style.display = 'block';
    btnAnalyze.disabled = false;
  }
};

// ═══════════════════════════════════════════════════════
//  ANALYSES
// ═══════════════════════════════════════════════════════
async function loadAnalyses(projectId) {
  const analyses = await api.get(`/api/projects/${projectId}/analyses`);
  renderAnalyses(analyses);
}

function renderAnalyses(list) {
  const container = document.getElementById('analysesList');
  const counter   = document.getElementById('historyCount');
  const completed = list.filter(a => a.status === 'completed');

  counter.textContent = list.length ? `${list.length} запуск${plural(list.length)}` : '';

  if (!list.length) {
    container.innerHTML = '<div class="history-empty">Запусков пока нет — загрузите первый файл</div>';
    return;
  }

  container.innerHTML = '';
  list.forEach(a => {
    const tpl  = document.getElementById('tplAnalysis').content.cloneNode(true);
    const card = tpl.querySelector('.analysis-card');

    card.querySelector('.analysis-filename').textContent = a.filename;
    card.querySelector('.analysis-date').textContent     = fmtDateTime(a.created_at);

    const statusEl = card.querySelector('.analysis-status');
    if (a.status === 'completed') {
      statusEl.innerHTML = '<span class="badge badge-green"><i class="bi bi-check-lg"></i> Готово</span>';
      card.querySelector('.astat-num.total').textContent = (a.stats_total   || 0).toLocaleString('ru');
      card.querySelector('.astat-num.auto').textContent  = (a.stats_auto    || 0).toLocaleString('ru');
      card.querySelector('.astat-num.req').textContent   = (a.stats_request || 0).toLocaleString('ru');

      // Кнопки скачивания
      const filesEl = card.querySelector('.analysis-files');
      const FILE_TYPES = [
        { type: 'source',   label: 'Исходный', icon: 'bi-file-earmark-spreadsheet', cls: '' },
        { type: 'analysis', label: 'Анализ',   icon: 'bi-table',                    cls: 'blue' },
        { type: 'request',  label: 'Запрос',   icon: 'bi-file-earmark-text',        cls: 'green' },
      ];
      const fileById = {};
      (a.files || []).forEach(f => { fileById[f.file_type] = f; });

      FILE_TYPES.forEach(({ type, label, icon, cls }) => {
        const f   = fileById[type];
        const btn = document.createElement('a');
        btn.className = `dl-chip ${cls}${f ? '' : ' disabled'}`;
        btn.innerHTML = `<i class="bi ${icon}"></i> ${label}`;
        if (f) {
          btn.href    = '#';
          btn.title   = label;
          btn.onclick = e => { e.preventDefault(); downloadFile(f.id, btn); };
        } else {
          btn.title = 'Файл недоступен';
        }
        filesEl.appendChild(btn);
      });

      // ── Кнопка «Загрузить КП» ──────────────────────────────────────────
      const kpDivider = document.createElement('div');
      kpDivider.className = 'kp-divider';
      filesEl.appendChild(kpDivider);

      const kpInput = document.createElement('input');
      kpInput.type    = 'file';
      kpInput.accept  = '.pdf,.xlsx,.xls';
      kpInput.style.display = 'none';
      filesEl.appendChild(kpInput);

      const kpBtn = document.createElement('a');
      kpBtn.className = 'dl-chip amber';
      kpBtn.href      = '#';
      kpBtn.innerHTML = '<i class="bi bi-cloud-arrow-up"></i> Загрузить КП';
      kpBtn.title     = 'Загрузить коммерческое предложение для сопоставления цен (PDF, XLSX, XLS)';
      filesEl.appendChild(kpBtn);

      const kpResult = document.createElement('div');
      kpResult.className = 'kp-result';
      filesEl.appendChild(kpResult);

      kpBtn.onclick = e => { e.preventDefault(); kpInput.click(); };

      kpInput.onchange = async () => {
        const file = kpInput.files[0];
        if (!file) return;

        kpBtn.classList.add('loading');
        kpBtn.innerHTML = '<i class="bi bi-arrow-repeat"></i> Обработка…';
        kpResult.textContent = '';
        kpResult.className   = 'kp-result';

        const fd = new FormData();
        fd.append('file', file);

        try {
          const resp = await fetch(`/api/analyses/${a.id}/upload-kp`, { method: 'POST', body: fd });
          const data = await resp.json();
          if (!resp.ok) throw new Error(data.error || `HTTP ${resp.status}`);

          if (data.matched > 0) {
            kpResult.textContent = `Обновлено ${data.matched} из ${data.total} позиций`;
            kpResult.classList.add('kp-result-ok');
            showToast(`КП загружено — обновлено ${data.matched} из ${data.total} позиций`);
          } else {
            kpResult.textContent = `Совпадений не найдено (КП: ${data.total} позиций)`;
            kpResult.classList.add('kp-result-warn');
            showToast('Совпадений с позициями сметы не найдено');
          }
        } catch (err) {
          showToast('Ошибка КП: ' + err.message);
        } finally {
          kpBtn.classList.remove('loading');
          kpBtn.innerHTML = '<i class="bi bi-cloud-arrow-up"></i> Загрузить КП';
          kpInput.value   = '';
        }
      };
    } else if (a.status === 'error') {
      statusEl.innerHTML = '<span class="badge badge-red"><i class="bi bi-exclamation-triangle"></i> Ошибка</span>';
      card.querySelector('.analysis-stats').style.display = 'none';
      if (a.error_message) {
        const err = document.createElement('div');
        err.className = 'analysis-error-msg';
        err.textContent = a.error_message;
        card.querySelector('.analysis-files').appendChild(err);
      }
    } else {
      statusEl.innerHTML = '<span class="badge badge-gray"><i class="bi bi-hourglass-split"></i> В процессе</span>';
      card.querySelector('.analysis-stats').style.display = 'none';
    }

    container.appendChild(tpl);
  });
}

// ═══════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════
function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('ru', { day:'2-digit', month:'short', year:'numeric' });
}
function fmtDateTime(iso) {
  return new Date(iso).toLocaleString('ru', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
}
function plural(n) {
  if (n % 10 === 1 && n % 100 !== 11) return '';
  if ([2,3,4].includes(n % 10) && ![12,13,14].includes(n % 100)) return 'а';
  return 'ов';
}

// ═══════════════════════════════════════════════════════
//  DOWNLOAD
// ═══════════════════════════════════════════════════════
async function downloadFile(fileId, chipEl) {
  chipEl.classList.add('loading');
  try {
    const resp = await fetch(`/api/files/${fileId}/download?t=${Date.now()}`, { cache: 'no-store' });
    if (!resp.ok) {
      const body = await resp.json().catch(() => ({ error: 'Неизвестная ошибка' }));
      throw new Error(body.error || `HTTP ${resp.status}`);
    }

    const blob = await resp.blob();

    // Извлекаем имя файла из заголовка Content-Disposition
    const cd = resp.headers.get('content-disposition') || '';
    const m  = cd.match(/filename\*=UTF-8''([^;]+)/i) || cd.match(/filename="([^"]+)"/i);
    const filename = m ? decodeURIComponent(m[1]) : 'file.xlsx';

    const url = URL.createObjectURL(blob);
    const a   = document.createElement('a');
    a.href     = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch (err) {
    showToast('Ошибка скачивания: ' + err.message);
  } finally {
    chipEl.classList.remove('loading');
  }
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  t.getBoundingClientRect(); // force reflow
  t.classList.add('toast-show');
  setTimeout(() => {
    t.classList.remove('toast-show');
    t.addEventListener('transitionend', () => t.remove(), { once: true });
  }, 3500);
}

// ── Init ──────────────────────────────────────────────
loadProjects();
</script>
